<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture Slides Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* --- デザインシステム --- */
        * { box-sizing: border-box; }
        body { background-color: #000; margin: 0; height: 100vh; width: 100vw; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #presentation-wrapper { position: relative; width: 1280px; height: 720px; }
        .slide-container { align-items: center; background-color: #121212; border-radius: 0; box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5); display: none; flex-direction: column; font-family: 'Noto Sans JP', sans-serif; height: 720px; justify-content: center; overflow: hidden; padding: 60px; position: absolute; top: 0; left: 0; width: 1280px; color: #fff; z-index: 0; }
        .slide-container.active { display: flex; z-index: 10; animation: fadeIn 0.5s ease; }
        .slide-container.bleed-image-layout.active { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); align-items: start; padding: 0; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* Background Shapes */
        .slide-container::before { content: ''; position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(62,184,255,0.1) 0%, rgba(0,0,0,0) 70%); z-index: 0; }
        .slide-container::after { content: ''; position: absolute; bottom: -100px; left: -100px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,0,128,0.1) 0%, rgba(0,0,0,0) 70%); z-index: 0; }
        .slide-container > * { position: relative; z-index: 1; }
        /* Typography */
        h1, h2, h3 { font-family: 'Poppins', 'Noto Sans JP', sans-serif; margin: 0; line-height: 1.2; }
        .slide-container h1 { font-size: 72px; font-weight: 800; background: linear-gradient(90deg, #fff, #ccc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .slide-container .slide-title { font-size: 48px; font-weight: 600; color: #fff; width: 100%; text-align: left; border-left: 6px solid #00d4ff; padding-left: 20px; margin-bottom: 40px; }
        .slide-container h3 { font-size: 28px; font-weight: 700; color: #00d4ff; margin-bottom: 15px; }
        .slide-container p, .slide-container li { font-size: 20px; line-height: 1.6; color: #e0e0e0; font-family: 'Noto Sans JP', sans-serif; }
        /* Layouts */
        .content-area { display: flex; flex-direction: column; flex-grow: 1; width: 100%; justify-content: center; }
        .full-bg-image { padding: 0; background: radial-gradient(circle at 10% 20%, rgba(0, 212, 255, 0.2) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(255, 0, 128, 0.2) 0%, transparent 40%), linear-gradient(135deg, #121212 0%, #1a1a1a 100%); }
        .full-bg-image .content-overlay { background: rgba(0, 0, 0, 0.4); padding: 80px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .full-bg-image h2 { font-size: 80px; color: #fff; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 20px; text-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
        .full-bg-image p { font-size: 32px; color: #00d4ff; font-weight: 600; }
        .section-title-layout { text-align: center; border: 2px solid #333; padding: 80px; border-radius: 20px; background: rgba(255,255,255,0.03); }
        .section-title-layout h2 { font-size: 64px; color: #fff; margin-bottom: 30px; }
        .section-title-layout hr { width: 100px; height: 4px; background: linear-gradient(90deg, #00d4ff, #ff0080); border: none; margin: 0 auto 30px auto; }
        .section-title-layout p { font-size: 24px; color: #aaa; }
        .two-column.tiled { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; height: 100%; }
        .two-column.tiled > div { background: rgba(255, 255, 255, 0.05); border: 1px solid #333; border-radius: 12px; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .two-column.tiled h3 { font-size: 32px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 25px; }
        .slide-container.bleed-image-layout .content-container { padding: 80px 60px; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .slide-container.bleed-image-layout .image-container { height: 100%; width: 100%; background: #1e1e1e; display: flex; align-items: center; justify-content: center; border-left: 1px solid #333; position: relative; overflow: hidden; }
        .slide-container.bleed-image-layout .image-container::before { content: ''; position: absolute; width: 200%; height: 200%; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; transform: rotate(15deg); }
        .slide-container.bleed-image-layout .bleed-text-side p { font-size: 22px; margin-bottom: 20px; }
        .highlight-box { background: rgba(0, 212, 255, 0.1); border-left: 4px solid #00d4ff; padding: 20px; margin-top: 20px; font-size: 18px; color: #e0e0e0; }
        svg.generated-art { width: 80%; height: 80%; z-index: 2; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        .tiled-content { display: flex; gap: 30px; width: 100%; justify-content: center; }
        .tile { flex: 1; background: #1e1e1e; border-radius: 12px; padding: 30px; text-align: center; border: 1px solid #333; transition: transform 0.3s ease; }
        .tile .icon { font-size: 50px; margin-bottom: 20px; display: inline-block; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; background: rgba(255,255,255,0.05); }
        .tile:nth-child(1) .icon { color: #00d4ff; } 
        .tile:nth-child(2) .icon { color: #ff0080; } 
        .tile:nth-child(3) .icon { color: #ffe600; } 
        .tile:nth-child(4) .icon { color: #00ff9d; } 
        .tile h3 { color: #fff; font-size: 22px; } .tile p { font-size: 16px; color: #aaa; }
        .qa-layout { text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; }
        .qa-layout h2 { font-size: 100px; background: linear-gradient(90deg, #00d4ff, #ff0080); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .footer-copyright { position: absolute; bottom: 20px; left: 20px; font-size: 10px; color: rgba(255, 255, 255, 0.5); z-index: 100; pointer-events: none; font-family: 'Noto Sans JP', sans-serif; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        .control-hint { position: fixed; bottom: 20px; right: 20px; color: #444; font-size: 12px; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body>

<div id="presentation-wrapper">
    </div>

<div class="control-hint">Use Arrows/Space to Navigate</div>

<script>
    /* ★ここに生成されたクイズデータ（const questions = [...]）を貼り付けてください★ */
    const questions = []; 

    /* --- スライド動作ロジック --- */
    let currentSlideIndex = 0;
    const slides = document.querySelectorAll('.slide-container');
    const wrapper = document.getElementById('presentation-wrapper');

    function updateSlideVisibility() {
        // 再取得（後から貼り付けられた要素を認識するため）
        const currentSlides = document.querySelectorAll('.slide-container');
        if (currentSlides.length === 0) return;
        
        currentSlides.forEach((slide, index) => {
            if (index === currentSlideIndex) { slide.classList.add('active'); } 
            else { slide.classList.remove('active'); }
        });
    }

    function goToNextSlide() {
        const currentSlides = document.querySelectorAll('.slide-container');
        if (currentSlideIndex < currentSlides.length - 1) { currentSlideIndex++; updateSlideVisibility(); }
    }
    function goToPrevSlide() {
        if (currentSlideIndex > 0) { currentSlideIndex--; updateSlideVisibility(); }
    }

    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case 'ArrowRight': case ' ': case 'Enter': if (document.activeElement.tagName !== 'BUTTON') { goToNextSlide(); } break;
            case 'ArrowLeft': goToPrevSlide(); break;
        }
    });

    function scalePresentation() {
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        const baseWidth = 1280; const baseHeight = 720;
        const scale = Math.min(windowWidth / baseWidth, windowHeight / baseHeight);
        wrapper.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', scalePresentation);
    
    function addCopyright() {
        const currentSlides = document.querySelectorAll('.slide-container');
        currentSlides.forEach(slide => {
            if(!slide.querySelector('.footer-copyright')){
                const footer = document.createElement('div');
                footer.className = 'footer-copyright';
                footer.innerText = '【Confidential 社外秘】 ©︎ ACT HOUSE ®︎ All Rights Reserved.';
                slide.appendChild(footer);
            }
        });
    }

    window.onload = function() {
        addCopyright();
        updateSlideVisibility();
        scalePresentation();
    };
</script>
</body>
</html>
