<!-- スライドB-1: セクション1-2 ロゴ基本形＆クリアスペース -->
<div class="slide-container standard-content-layout">
    <h2 class="slide-title">作成パーツ①：ロゴ基本形 & クリアスペース</h2>
    <div class="content-block">
        <svg class="generated-art" viewBox="0 0 800 320" style="max-height: 45vh; width: auto;">
            <!-- ロゴ基本形セクション -->
            <rect x="20" y="20" width="360" height="280" fill="rgba(0,212,255,0.05)" stroke="#00d4ff" stroke-width="2" rx="8"/>
            <text x="200" y="50" text-anchor="middle" fill="#00d4ff" font-size="14" font-weight="bold">① ロゴ基本形</text>
            
            <!-- ロゴ配置エリア -->
            <rect x="80" y="80" width="240" height="120" fill="#1a1a1a" stroke="#333" stroke-width="1" rx="4"/>

            <text x="220" y="148" fill="white" font-size="20" font-weight="bold">CAFE</text>
            
            <!-- 説明 -->
            <text x="200" y="230" text-anchor="middle" fill="#888" font-size="11">ロゴのフルカラー版を配置</text>
            <text x="200" y="250" text-anchor="middle" fill="#888" font-size="11">シンボル + ロゴタイプの基本構成</text>
            <text x="200" y="280" text-anchor="middle" fill="#666" font-size="10">※ AIで生成したロゴをここに配置</text>
            
            <!-- クリアスペースセクション -->
            <rect x="420" y="20" width="360" height="280" fill="rgba(255,107,107,0.05)" stroke="#ff6b6b" stroke-width="2" rx="8"/>
            <text x="600" y="50" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">② クリアスペース</text>
            
            <!-- クリアスペース図解 -->
            <rect x="480" y="80" width="240" height="140" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="6,3"/>
            <rect x="520" y="110" width="160" height="80" fill="#1a1a1a" stroke="#333" stroke-width="1" rx="4"/>
            <circle cx="570" cy="150" r="22" fill="none" stroke="#00d4ff" stroke-width="2"/>
            <text x="620" y="155" fill="white" font-size="14" font-weight="bold">CAFE</text>
            
            <!-- 余白の矢印と注釈 -->
            <line x1="480" y1="150" x2="515" y2="150" stroke="#ff6b6b" stroke-width="1"/>
            <text x="450" y="150" fill="#ff6b6b" font-size="9">余白X</text>
            
            <line x1="600" y1="80" x2="600" y2="105" stroke="#ff6b6b" stroke-width="1"/>
            <text x="600" y="72" text-anchor="middle" fill="#ff6b6b" font-size="9">余白X</text>
            
            <!-- 説明 -->
            <text x="600" y="250" text-anchor="middle" fill="#888" font-size="11">ロゴ周囲に確保する余白を定義</text>
            <text x="600" y="270" text-anchor="middle" fill="#888" font-size="11">X = ロゴ高さの 1/4 を推奨</text>
            <text x="600" y="290" text-anchor="middle" fill="#666" font-size="10">※ 点線の矩形で余白範囲を図示</text>
        </svg>
        
        <div class="highlight-box">
            💡 Figmaで矩形ツールを使い、点線（Stroke: Dashed）でクリアスペースを表現
        </div>
    </div>
</div>

<!-- スライドB-2: セクション3-4 最小サイズ＆カラーバリエーション -->

<!-- スライドB-3: セクション5 禁止事項 -->
<div class="slide-container standard-content-layout">
    <h2 class="slide-title">作成パーツ③：禁止事項（これが最重要）</h2>
    <div class="content-block">
        <svg class="generated-art" viewBox="0 0 800 320" style="max-height: 45vh; width: auto;">
            <!-- 禁止事項セクション -->
            <rect x="50" y="20" width="700" height="280" fill="rgba(255,107,107,0.05)" stroke="#ff6b6b" stroke-width="2" rx="8"/>
            <text x="400" y="50" text-anchor="middle" fill="#ff6b6b" font-size="16" font-weight="bold">⑤ 禁止事項 - やってはいけない使い方</text>
            
            <!-- 禁止例1: 傾ける -->
            <rect x="80" y="80" width="140" height="100" fill="#1a1a1a" stroke="#333" stroke-width="1" rx="4"/>
            <g transform="rotate(20, 150, 120)">
                <circle cx="125" cy="120" r="18" fill="none" stroke="#00d4ff" stroke-width="2"/>
                <text x="160" y="125" fill="white" font-size="12">CAFE</text>
            </g>
            <circle cx="200" cy="80" r="15" fill="#ff6b6b"/>
            <text x="200" y="85" text-anchor="middle" fill="white" font-size="16" font-weight="bold">✕</text>
            <text x="150" y="200" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">傾けて使用</text>
            <text x="150" y="220" text-anchor="middle" fill="#888" font-size="9">角度をつけない</text>
            
            <!-- 禁止例2: 色を変える -->
            <rect x="250" y="80" width="140" height="100" fill="#1a1a1a" stroke="#333" stroke-width="1" rx="4"/>
            <circle cx="295" cy="120" r="18" fill="none" stroke="#ff00ff" stroke-width="2"/>
            <text x="330" y="125" fill="#00ff00" font-size="12">CAFE</text>
            <circle cx="370" cy="80" r="15" fill="#ff6b6b"/>
            <text x="370" y="85" text-anchor="middle" fill="white" font-size="16" font-weight="bold">✕</text>
            <text x="320" y="200" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">色を変更</text>
            <text x="320" y="220" text-anchor="middle" fill="#888" font-size="9">指定色以外は禁止</text>
            
            <!-- 禁止例3: 分離する -->
            <rect x="420" y="80" width="140" height="100" fill="#1a1a1a" stroke="#333" stroke-width="1" rx="4"/>
            <circle cx="450" cy="110" r="18" fill="none" stroke="#00d4ff" stroke-width="2"/>
            <text x="510" y="140" fill="white" font-size="12">CAFE</text>
            <circle cx="540" cy="80" r="15" fill="#ff6b6b"/>
            <text x="540" y="85" text-anchor="middle" fill="white" font-size="16" font-weight="bold">✕</text>
            <text x="490" y="200" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">要素を分離</text>
            <text x="490" y="220" text-anchor="middle" fill="#888" font-size="9">シンボルと文字は一体</text>
            
            <!-- 禁止例4: 縦横比変更 -->
            <rect x="590" y="80" width="140" height="100" fill="#1a1a1a" stroke="#333" stroke-width="1" rx="4"/>
            <ellipse cx="635" cy="120" rx="25" ry="15" fill="none" stroke="#00d4ff" stroke-width="2"/>
            <text x="680" y="125" fill="white" font-size="12" transform="scale(1.3, 0.7)" x="520" y="175">CAFE</text>
            <circle cx="710" cy="80" r="15" fill="#ff6b6b"/>
            <text x="710" y="85" text-anchor="middle" fill="white" font-size="16" font-weight="bold">✕</text>
            <text x="660" y="200" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">縦横比を変更</text>
            <text x="660" y="220" text-anchor="middle" fill="#888" font-size="9">引き伸ばし禁止</text>
            
            <!-- 補足 -->
            <text x="400" y="270" text-anchor="middle" fill="#888" font-size="11">❌マークと共に「なぜダメなのか」を簡潔に記載する</text>
        </svg>
        
        <div class="highlight-box">
            ⚠️ 禁止事項は「やってはいけないこと」を視覚的に示すことで、誤用を効果的に防ぎます
        </div>
    </div>
</div>
